{% assign post = include.post %}
<article class="post-card{% unless post.cover_image %} text-only{% endunless %}">
  {% if post.cover_image %}
    <a class="post-card-media" href="{{ post.url | relative_url }}">
      <img src="{{ post.cover_image | relative_url }}" alt="" loading="lazy">
    </a>
  {% endif %}
  <div class="post-card-body">
    <p class="post-meta">{{ post.date | date: "%b %-d, %Y" }} · {{ post.author | default: site.author }}</p>
    <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
    <p>{{ post.description | default: post.excerpt | strip_html | truncate: 130 }}</p>
  </div>
</article>
